<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#FFF5EE" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('recall-theme');
          var m = document.querySelector('meta[name="theme-color"]');
          if (t === 'dark') {
            document.documentElement.dataset.theme = 'dark';
            if (m) m.setAttribute('content', '#1A1420');
          } else {
            document.documentElement.dataset.theme = 'light';
            if (m) m.setAttribute('content', '#FFF5EE');
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Recall — AI memory threads, Clara voice companion, medication vision, and cognitive storm radar for dementia care." />
    <title>Recall</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
